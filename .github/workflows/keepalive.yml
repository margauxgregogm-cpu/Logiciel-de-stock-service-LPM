name: Supabase Keep-Alive

on:
  schedule:
    # Tous les lundis à 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Appel de la route keep-alive Vercel
        run: |
          URL="https://service-produit-stock.vercel.app/api/keepalive"
          echo "Appel de $URL"
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" "$URL")
          echo "Code HTTP: $HTTP_CODE"
          cat response.json
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Échec du keep-alive (code $HTTP_CODE)"
            exit 1
          fi
