<style>
:root{
  --bg:#f8f6fd; --panel:#ffffff; --panel-2:#f3f0fc; --ink:#3a3564; --muted:#8680a8;
  --line:#e8e2f7; --blue:#a89bea; --blue-2:#8a7cd0; --green:#2e7d32; --orange:#d98200;
  --red:#c62828; --gray:#77808c; --shadow:0 4px 20px rgba(100,90,160,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
button,input,select{font:inherit}
button{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:7px;min-height:36px;padding:7px 13px;cursor:pointer;font-size:13px;transition:.12s}
button:hover{border-color:#a5bad0;background:#f5f8fc}
button.primary{background:var(--blue-2);border-color:var(--blue-2);color:#fff;font-weight:600}
button.primary:hover{background:#6f5fc2;border-color:#6f5fc2}
button.reset-active{background:var(--red);border-color:var(--red);color:#fff;font-weight:600}
button.reset-active:hover{background:#b02525;border-color:#b02525}
input,select{border:1px solid var(--line);background:#fff;border-radius:6px;min-height:34px;padding:7px 10px;color:var(--ink)}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:#332c5c;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.45)}
.sidebar-footer-name{color:rgba(255,255,255,.75);font-weight:600;margin-top:2px}
.sidebar-brand{display:flex;align-items:center;gap:11px;padding:18px 16px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-brand::before{content:"KD";display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;min-width:34px;background:var(--blue);border-radius:8px;color:#fff;font-size:12px;font-weight:800}
.sidebar-brand-text{display:flex;flex-direction:column}
.sidebar-brand-title{color:#deeaf6;font-size:13px;font-weight:700;line-height:1.25}
.sidebar-brand-sub{color:rgba(255,255,255,.5);font-size:11px;margin-top:2px}
.nav{padding:8px 0 10px;display:flex;flex-direction:column;gap:0}
.nav-section-label{padding:16px 13px 6px;font-size:10.5px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.35);text-transform:uppercase}
.nav button{background:transparent;border:none;border-left:3px solid transparent;color:rgba(255,255,255,.65);text-align:left;padding:10px 13px;border-radius:0;font-size:13px;min-height:auto;transition:background .12s,color .12s}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.active{background:rgba(255,255,255,.09);color:#fff;font-weight:600;border-left-color:var(--blue-2);}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:10px 22px 12px;display:flex;flex-direction:column;gap:8px;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(36,32,73,.06)}
.topbar .meta{color:var(--muted);font-size:12px}
.topbar .actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar .spacer{flex:1}
.content{padding:22px;flex:1}
.kpi-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:9px;margin-bottom:20px}
.kpi-grid .kpi{min-width:0}
.kpi{background:var(--panel);border:1px solid var(--line);border-left:3px solid #9aa7b6;border-radius:9px;padding:11px 11px;box-shadow:0 1px 3px rgba(36,32,73,.06);cursor:pointer;transition:.12s;overflow:hidden}
.kpi:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(36,32,73,.1)}
.kpi .kv{font-size:19px;font-weight:800;color:var(--ink);line-height:1.1}
.kpi .kl{color:var(--muted);font-size:10.5px;margin-top:3px;line-height:1.25;word-break:break-word}
.kpi.green{border-left-color:var(--green)} .kpi.orange{border-left-color:var(--orange)} .kpi.red{border-left-color:var(--red)} .kpi.blue{border-left-color:var(--blue)} .kpi.gray{border-left-color:var(--gray)}
@keyframes kpi-pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,40,40,.35)} 50%{box-shadow:0 0 0 16px rgba(200,40,40,0)}}
.kpi-pulse{animation:kpi-pulse 1.8s ease-in-out infinite;background:#fdecea!important;border-color:#e57373!important}
.kpi-pulse .kv{color:#c62828!important}
.kpi.kpi-red-filled{background:#e07878;border-left-color:#c62828}
.kpi.kpi-red-filled .kv,.kpi.kpi-red-filled .kl{color:#fff}
.kpi.kpi-orange-filled{background:#FFAA77;border-left-color:#FF7733}
.kpi.kpi-orange-filled .kv,.kpi.kpi-orange-filled .kl{color:#fff}
.kpi.kpi-darkorange-filled{background:#FFCC88;border-left-color:#FFAA44}
.kpi.kpi-darkorange-filled .kv,.kpi.kpi-darkorange-filled .kl{color:#fff}
.kpi.kpi-blue-filled{background:#b8d8f0;border-left-color:#5a9ec9}
.kpi.kpi-blue-filled .kv,.kpi.kpi-blue-filled .kl{color:#1a3f5c}
.kpi.kpi-rdu-filled{background:#0b5cab;border-left-color:#08447f}
.kpi.kpi-rdu-filled .kv,.kpi.kpi-rdu-filled .kl{color:#fff}
.kpi.kpi-rdu-border{border-left-color:#0b5cab}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(36,32,73,.06);margin-bottom:20px}
.panel h3{margin:0 0 12px;font-size:14px;padding-left:9px;border-left:3px solid var(--blue);color:var(--ink)}
.grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:20px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:7px 9px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
th{background:var(--panel-2);position:sticky;top:0;color:var(--muted);font-weight:600}
tr:hover td{background:#f7fafd}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-green{background:#e3f3e4;color:var(--green)} .b-orange{background:#fdecd2;color:var(--orange)} .b-red{background:#fbe1e1;color:var(--red)} .b-gray{background:#eceff2;color:var(--gray)} .b-blue{background:#efeafc;color:var(--blue-2)}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{min-height:32px}
.table-wrap{max-height:560px;overflow:auto;border:1px solid var(--line);border-radius:8px}
.drop-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.drop-box{width:520px;max-width:92vw;border:1.5px dashed #d3caf2;border-radius:10px;background:#faf9fe;padding:60px 40px;text-align:center;box-shadow:0 1px 4px rgba(100,90,160,.08)}
.drop-box.drag{border-color:var(--blue);background:#f3f0fc}
.drop-box h2{margin:0 0 8px;font-size:19px}
.drop-box p{color:var(--muted);font-size:13px;margin:0 0 22px}
.hide{display:none!important}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel-2);color:var(--muted)}
.import-banner{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:20px;margin:2px 0 10px}
.import-banner.ok{background:#e3f3e4;color:var(--green)}
.import-banner.stale{background:#fdecd2;color:#a0651a;cursor:pointer}
.import-banner.stale:hover{background:#fbe1b8}
.count-pill{display:inline-flex;align-items:baseline;gap:5px;background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:6px 14px;color:var(--blue-2)}
.count-pill b{font-size:15px;font-weight:800}
.count-pill span{font-size:11.5px;color:var(--muted)}
.modal-bg{position:fixed;inset:0;background:rgba(10,18,32,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:12px;width:min(1050px,94vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.modal-head h3{margin:0;flex:1;font-size:15px}
.modal-body{padding:16px 20px;overflow:auto}
.chart-wrap{max-width:320px;margin:0 auto}
.legend-list{display:flex;flex-direction:column;gap:6px;margin-top:10px;font-size:12.5px}
.legend-item{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 6px;border-radius:6px}
.legend-item:hover{background:var(--panel-2)}
.dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.small{font-size:11.5px;color:var(--muted)}
.anomaly-msg{color:var(--red);font-size:12px}
</style>
</head>
<body>

<input type="file" id="fileInput" accept=".csv,.xlsx,.xls" class="hide">

<div class="app-shell" id="appShell">
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-title">Kube Design</div>
        <div class="sidebar-brand-sub">Service LPM</div>
      </div>
    </div>

// ---------- AUTO-MISE À JOUR ----------
// Service worker (uniquement pour piloter le rechargement, aucune mise en cache)
// + vérification périodique d'une nouvelle version déployée (via l'en-tête ETag
// de la page), pour recharger automatiquement sans que l'utilisateur ait à faire F5.
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
  let swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(swRefreshing) return;
    swRefreshing = true;
    location.reload();
  });
}
let PAGE_VERSION_TAG = null;
async function checkForNewVersion(){
  try{
    const res = await fetch(location.pathname, {method:'HEAD', cache:'no-store'});
    const tag = res.headers.get('etag') || res.headers.get('last-modified');
    if(!tag) return;
    if(PAGE_VERSION_TAG === null){ PAGE_VERSION_TAG = tag; return; }
    if(tag !== PAGE_VERSION_TAG) location.reload();
  }catch(e){ /* pas de connexion, on réessaiera au prochain tick */ }
}
checkForNewVersion();
setInterval(checkForNewVersion, 45000);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) checkForNewVersion(); });

function norm(v){
  if(v===null||v===undefined) return '';
  let s = String(v).trim();
  if(s==='' ) return '';
  return s;
}
function up(v){ return norm(v).toUpperCase(); }

function handleFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    let data = e.target.result;
    let wb;
    if(file.name.toLowerCase().endsWith('.csv')){
      wb = XLSX.read(data, {type:'binary', raw:true});
    } else {
      wb = XLSX.read(data, {type:'binary'});
    }
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, {defval:''});
    ingest(json, file.name);
  };
  reader.readAsBinaryString(file);
}

function extractFileDate(filename, importTs){
  // Cherche une date au format JJMMAAAA dans le nom du fichier (ex: 13072026)
  const matches = filename.match(/\d{8}/g) || [];
  for(const m of matches){
    const day = parseInt(m.slice(0,2),10);
    const month = parseInt(m.slice(2,4),10);
    const year = parseInt(m.slice(4,8),10);
    if(day>=1 && day<=31 && month>=1 && month<=12 && year>=2000 && year<=2100){
      const d = new Date(year, month-1, day);
      if(d.getMonth()===month-1) return {date:d, source:'filename'};
    }
  }
  // Repli : date d'import du fichier
  return {date:new Date(importTs.getFullYear(), importTs.getMonth(), importTs.getDate()), source:'import'};
}
function isSameDay(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

      TYPE_MOBILIER: norm(r.TYPE_MOBILIER),
      COMMENTAIRE: norm(r.COMMENTAIRE)

const HISTORY_KEY = 'soda_import_history';
const HISTORY_MAX = 40;
let currentHistoryId = null;
let HISTORY_CACHE = [];

function getImportHistory(){
  return HISTORY_CACHE;
}
function getLocalHistory(){
  try{ const raw = localStorage.getItem(HISTORY_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return [];
}
function saveLocalHistory(list){
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }
  catch(e){ console.warn('Historique : espace de stockage local insuffisant, entrée(s) la/les plus ancienne(s) non conservée(s).'); }
}
async function loadHistoryFromSupabase(){
  if(!sb){ HISTORY_CACHE = getLocalHistory(); return; }
  try{
    const {data, error} = await sb
      .from('import_history')
      .select('*')
      .order('imported_at', {ascending:false})
      .limit(HISTORY_MAX);
    if(error) throw error;
    HISTORY_CACHE = data.map(row=>({
      id: row.id, date: row.imported_at, filename: row.filename,
      rows: row.rows_count, anomalies: row.anomalies_count, data: row.data
    }));
    saveLocalHistory(HISTORY_CACHE);
  }catch(e){
    console.warn('Supabase indisponible, historique local utilisé.', e);
    HISTORY_CACHE = getLocalHistory();
  }
}

// Synchronisation multi-poste : quand un autre poste importe ou supprime un
// fichier, on veut que ça se reflète ici sans action de l'utilisateur. La
// colonne "data" peut être volumineuse (gros imports) et dépasser la limite
// de taille de Supabase Realtime, donc le message reçu n'est qu'un signal :
// on va toujours rechercher les données fraîches via une requête normale.
async function refreshHistoryFromRemote(){
  const previousLatestId = HISTORY_CACHE[0] ? HISTORY_CACHE[0].id : null;
  const previousIds = new Set(HISTORY_CACHE.map(e=>e.id));
  await loadHistoryFromSupabase();
  const stillActiveExists = HISTORY_CACHE.some(e=>e.id===currentHistoryId);
  if(currentHistoryId && !stillActiveExists){
    // l'import affiché a été supprimé ailleurs
    currentHistoryId = null;
    if(HISTORY_CACHE.length>0) openHistoryEntry(HISTORY_CACHE[0].id);
    else { RAW_ROWS = []; ANOMALIES = []; showEmptyState(); }
  } else if(HISTORY_CACHE.length>0 && HISTORY_CACHE[0].id!==previousLatestId && !previousIds.has(HISTORY_CACHE[0].id)){
    // un nouvel import est arrivé ailleurs : on l'affiche
    openHistoryEntry(HISTORY_CACHE[0].id);
  }
  const histTab = document.getElementById('tab-historique');
  if(histTab && !histTab.classList.contains('hide')) renderHistorique();
}

function subscribeToHistoryChanges(){
  if(!sb) return;
  sb.channel('import_history_changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'import_history'}, ()=>{ refreshHistoryFromRemote(); })
    .subscribe();
  // Filet de sécurité si Realtime rate un évènement (gros payload, etc.)
  setInterval(async ()=>{
    try{
      const {data, error} = await sb.from('import_history').select('id').order('imported_at',{ascending:false}).limit(1);
      if(error) throw error;
      const latestId = data && data[0] ? data[0].id : null;
      const knownId = HISTORY_CACHE[0] ? HISTORY_CACHE[0].id : null;
      if(latestId!==knownId || (HISTORY_CACHE.length===0 && latestId)) refreshHistoryFromRemote();
    }catch(e){ /* on réessaiera au prochain tick */ }
  }, 20000);
}

// ---------- ANOMALIES ----------
const RULE_DEFS = [
  {key:'r1', label:'Statut MAGASIN / VOL EN MAGASIN : champs magasin incomplets'},
  {key:'r2', label:'FACTICE avec IMEI renseigné'},
  {key:'r3', label:'STOCK KUBE : champs magasin non vides'},
  {key:'r5', label:'HS sans commentaire'},
  {key:'r8', label:'Produit sans nom'},
  {key:'r9', label:'RDU / RDU LPM incomplet (N_SERIE / IMEI)'},
  {key:'r10', label:'LDU sans N_SERIE'},
  {key:'r67', label:'FACTICE : incohérence de N_SERIE entre produits identiques'}
];
let ANOMALY_RULES_CACHE = null;
function getEnabledRules(){
  if(ANOMALY_RULES_CACHE) return ANOMALY_RULES_CACHE;
  try{
    const raw = localStorage.getItem('soda_anomaly_rules');
    if(raw){ ANOMALY_RULES_CACHE = JSON.parse(raw); return ANOMALY_RULES_CACHE; }
  }catch(e){}
  const def = {};
  RULE_DEFS.forEach(r=> def[r.key]=true);
  ANOMALY_RULES_CACHE = def;
  return def;
}
function setEnabledRules(obj){
  ANOMALY_RULES_CACHE = obj;
  try{ localStorage.setItem('soda_anomaly_rules', JSON.stringify(obj)); }catch(e){}
  syncSettingToSupabase('anomaly_rules', obj);
}

function computeAnomalies(){
  ANOMALIES = RAW_ROWS.map(r=>({row:r, messages:[]}));
  const byIdx = ANOMALIES;

  // Table N_SERIE -> nom produit, construite à partir des FACTICE déjà nommés
  const nserieToName = {};
  const nserieToNameFreq = {};
  RAW_ROWS.forEach(r=>{
    if(r.TYPE_PRODUIT==='FACTICE' && r.N_SERIE && r.PRODUIT){
      nserieToNameFreq[r.N_SERIE] = nserieToNameFreq[r.N_SERIE] || {};
      nserieToNameFreq[r.N_SERIE][r.PRODUIT] = (nserieToNameFreq[r.N_SERIE][r.PRODUIT]||0)+1;
    }
  });
  Object.keys(nserieToNameFreq).forEach(ns=>{
    const names = nserieToNameFreq[ns];
    let best = null;
    Object.keys(names).forEach(n=>{ if(!best || names[n]>names[best]) best = n; });
    nserieToName[ns] = best;
  });

  RAW_ROWS.forEach((r,i)=>{
    const msgs = byIdx[i].messages;

    // Regle 1: MAGASIN / VOL EN MAGASIN -> champs obligatoires
    if(r.STATUT==='MAGASIN' || r.STATUT==='VOL EN MAGASIN'){
      const miss = [];
      if(!r.MAGASIN) miss.push('MAGASIN');
      if(!r.REGATE) miss.push('REGATE');
      if(!r.FORMAT_MOBILIER) miss.push('FORMAT_MOBILIER');
      if(!r.TYPE_MOBILIER) miss.push('TYPE_MOBILIER');
      if(miss.length) msgs.push({rule:'r1', text:`Statut ${r.STATUT} : champ(s) manquant(s) — ${miss.join(', ')}`});
    }

    // Regle 2: FACTICE ne doit pas avoir d'IMEI
    if(r.TYPE_PRODUIT==='FACTICE' && r.IMEI){
      msgs.push({rule:'r2', text:'FACTICE avec IMEI renseigné'});
    }

    // Regle 3: STOCK KUBE -> champs magasin doivent être vides
    if(r.STATUT==='STOCK KUBE'){
      const fill = [];
      if(r.MAGASIN) fill.push('MAGASIN');
      if(r.REGATE) fill.push('REGATE');
      if(r.FORMAT_MOBILIER) fill.push('FORMAT_MOBILIER');
      if(r.TYPE_MOBILIER) fill.push('TYPE_MOBILIER');
      if(fill.length) msgs.push({rule:'r3', text:`Statut STOCK KUBE : champ(s) qui devraient être vides — ${fill.join(', ')}`});
    }

    // Regle 5: HS doit avoir un commentaire
    if(r.STATUT==='HS' && !r.COMMENTAIRE){
      msgs.push({rule:'r5', text:'Produit HS sans commentaire'});
    }

    // Regle 8: tout produit doit avoir un nom (y compris les FACTICE)
    if(!r.PRODUIT){
      if(r.TYPE_PRODUIT==='FACTICE' && r.N_SERIE && nserieToName[r.N_SERIE]){
        msgs.push({rule:'r8', text:`Produit FACTICE sans nom — suggestion : "${nserieToName[r.N_SERIE]}" (d'après le N_SERIE ${r.N_SERIE} sur d'autres factices)`});
      } else {
        msgs.push({rule:'r8', text:'Produit sans nom (PRODUIT vide)'});
      }
    }

    // Regle 9: RDU / RDU LPM -> N_SERIE + IMEI obligatoires (sauf BOX SFR, sans IMEI par nature)
    if(r.TYPE_PRODUIT==='RDU' || r.TYPE_PRODUIT==='RDU LPM'){
      const isBoxSfr = r.PRODUIT.toUpperCase().includes('BOX SFR');
      const miss=[];
      if(!r.N_SERIE) miss.push('N_SERIE');
      if(!r.IMEI && !isBoxSfr) miss.push('IMEI');
      if(miss.length) msgs.push({rule:'r9', text:`${r.TYPE_PRODUIT} incomplet — ${miss.join(', ')} manquant(s)`});
    }

    // Regle 10: LDU -> N_SERIE obligatoire
    if(r.TYPE_PRODUIT==='LDU' && !r.N_SERIE){
      msgs.push({rule:'r10', text:'LDU sans N_SERIE'});
    }
  });

  // Regle 6/7 : cohérence N_SERIE des FACTICE par nom de produit
  const groups = {};
  RAW_ROWS.forEach((r,i)=>{
    if(r.TYPE_PRODUIT==='FACTICE' && r.PRODUIT){
      (groups[r.PRODUIT] = groups[r.PRODUIT] || []).push(i);
    }
  });
  Object.keys(groups).forEach(pname=>{
    const idxs = groups[pname];
    const freq = {};
    idxs.forEach(i=>{
      const ns = RAW_ROWS[i].N_SERIE;
      if(ns) freq[ns] = (freq[ns]||0)+1;
    });
    const keys = Object.keys(freq);
    if(keys.length===0) return; // aucun N_SERIE dans le groupe, rien à vérifier
    let majority = keys[0];
    keys.forEach(k=>{ if(freq[k]>freq[majority]) majority = k; });
    idxs.forEach(i=>{
      const ns = RAW_ROWS[i].N_SERIE;
      if(!ns){
        byIdx[i].messages.push({rule:'r67', text:`FACTICE "${pname}" : N_SERIE manquant (attendu ${majority} d'après les autres lignes du même produit)`});
      } else if(ns!==majority){
        byIdx[i].messages.push({rule:'r67', text:`FACTICE "${pname}" : N_SERIE incohérent (${ns}) — suggestion ${majority}`});
      }
    });
  });
}

function anomalyRows(){
  const enabled = getEnabledRules();
  return ANOMALIES
    .map(a=>({row:a.row, messages:a.messages.filter(m=> enabled[m.rule]!==false)}))
    .filter(a=>a.messages.length>0);
}

function ruptureCountForRows(rows){
  const allProducts = new Set(rows.filter(r=>r.PRODUIT).map(r=>r.PRODUIT));
  const stockKube = rows.filter(r=>r.STATUT==='STOCK KUBE');
  const qty = {};
  stockKube.forEach(r=>{ qty[r.PRODUIT] = (qty[r.PRODUIT]||0)+1; });
  const exclusions = getRuptureExclusions();
  let count = 0;
  allProducts.forEach(p=>{ if((qty[p]||0)===0 && !exclusions[p]) count++; });
  return count;
}

function productBands(){
  // univers = tous les PRODUIT distincts non vides ; quantite = nb de lignes STATUT=STOCK KUBE pour ce produit
  const allProducts = new Set(RAW_ROWS.filter(r=>r.PRODUIT).map(r=>r.PRODUIT));
  const stockKube = RAW_ROWS.filter(r=>r.STATUT==='STOCK KUBE');
  const qty = {};
  stockKube.forEach(r=>{ qty[r.PRODUIT] = (qty[r.PRODUIT]||0)+1; });
  const list0Raw = [], list05 = [], list610 = [];
  allProducts.forEach(p=>{
    const q = qty[p]||0;
    if(q===0) list0Raw.push({produit:p, qty:q});
    else if(q>=1 && q<=5) list05.push({produit:p, qty:q});
    else if(q>=6 && q<=10) list610.push({produit:p, qty:q});
  });
  list0Raw.sort((a,b)=>a.produit.localeCompare(b.produit));
  list05.sort((a,b)=>a.qty-b.qty);
  list610.sort((a,b)=>a.qty-b.qty);
  const exclusions = getRuptureExclusions();
  const list0 = list0Raw.filter(x=> !exclusions[x.produit]);
  return {list0, list0Raw, list05, list610};
}

function marqueCounts(){
  const m = {};
  RAW_ROWS.forEach(r=>{ const k=r.MARQUE||'(vide)'; m[k]=(m[k]||0)+1; });

}

function deriveGamme(produit){
  const p = (produit||'').toUpperCase();
  if(!p) return 'AUTRES';
  if(p.includes('GALAXY S')) return 'GALAXY S SERIES';
  if(p.includes('GALAXY Z')) return 'GALAXY Z SERIES';
  if(p.includes('GALAXY A')) return 'GALAXY A SERIES';
  if(p.includes('BUDS')) return 'BUDS';
  if(p.includes('WATCH')) return 'WATCH';
  if(p.includes('TAB')) return 'TAB';
  if(p.includes('BOOK')) return 'BOOK';
  if(p.includes('XCOVER')) return 'XCOVER';
  if(p.includes('REDMI') || p.startsWith('XIAOMI')) return 'XIAOMI';
  if(p.includes('MOTOROLA') || p.includes('MOTO ')) return 'MOTOROLA';
  if(p.includes('IPHONE')) return 'IPHONE';
  if(p.includes('DORO')) return 'DORO';
  if(p.includes('BBOX') || p.includes('DECODEUR') || p.includes('BOX SFR')) return 'BOX / DÉCODEUR';
  if(p.includes('LEVA')) return 'LEVA';
  if(p.includes('THE PHONE')) return 'THE PHONE';
  return 'AUTRES';
}
function gammeCounts(){
  const factice = {}, autres = {};
  RAW_ROWS.filter(r=>r.STATUT==='STOCK KUBE' && r.PRODUIT).forEach(r=>{
    const k = deriveGamme(r.PRODUIT);
    if(r.TYPE_PRODUIT==='FACTICE') factice[k]=(factice[k]||0)+1;
    else autres[k]=(autres[k]||0)+1;
  });
  const gammes = new Set([...Object.keys(factice), ...Object.keys(autres)]);
  const data = [...gammes].map(g=>({
    gamme:g, factice:factice[g]||0, autres:autres[g]||0, total:(factice[g]||0)+(autres[g]||0)
  }));
  data.sort((a,b)=>b.total-a.total);
  return data;
}

let anomEvolPeriod = 'tout';
let ruptEvolPeriod = 'tout';
function setEvolPeriod(which, period){
  if(which==='anom') anomEvolPeriod = period; else ruptEvolPeriod = period;
  renderEvolutionCharts();
}
function periodKey(d, period){
  if(period==='semaine'){
    const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = (tmp.getUTCDay()+6)%7;
    tmp.setUTCDate(tmp.getUTCDate()-dayNum+3);
    const firstThursday = new Date(Date.UTC(tmp.getUTCFullYear(),0,4));
    const weekNo = 1+Math.round(((tmp-firstThursday)/86400000 - 3 + (firstThursday.getUTCDay()+6)%7)/7);
    return `${tmp.getUTCFullYear()}-S${String(weekNo).padStart(2,'0')}`;
  }
  if(period==='mois') return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  if(period==='annee') return `${d.getFullYear()}`;
  return null;
}
function bucketHistoryByPeriod(entriesAsc, period){
  if(period==='tout') return entriesAsc;
  const map = new Map();
  entriesAsc.forEach(e=>{ map.set(periodKey(new Date(e.date), period), e); }); // garde la dernière entrée de chaque période
  return [...map.values()];
}
function evolLabelFor(entry, period){
  const d = new Date(entry.date);
  const dd = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
  if(period==='tout') return dd;
  return periodKey(d, period).replace('-S',' S') + ` (${dd})`;
}
function renderEvolutionCharts(){
  const histAsc = [...HISTORY_CACHE].sort((a,b)=> new Date(a.date)-new Date(b.date));

  const anomEntries = bucketHistoryByPeriod(histAsc, anomEvolPeriod);
  const anomLabels = anomEntries.map(e=>evolLabelFor(e, anomEvolPeriod));
  const evolAnomalies = anomEntries.map(e=> e.anomalies||0);

  const ruptEntries = bucketHistoryByPeriod(histAsc, ruptEvolPeriod);
  const ruptLabels = ruptEntries.map(e=>evolLabelFor(e, ruptEvolPeriod));
  const evolRuptures = ruptEntries.map(e=> ruptureCountForRows(e.data||[]));

  if(window.__anomEvolChart) window.__anomEvolChart.destroy();
  window.__anomEvolChart = new Chart(document.getElementById('anomEvolCanvas'), {
    type:'line',
    data:{ labels:anomLabels, datasets:[{
      data:evolAnomalies, borderColor:'#d98200', backgroundColor:'rgba(217,130,0,0.12)',
      fill:true, tension:0.25, pointRadius:3, pointBackgroundColor:'#d98200'
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ y:{ beginAtZero:true, grid:{color:'#ece7f8'} }, x:{ grid:{display:false} } }
    }
  });

  if(window.__ruptEvolChart) window.__ruptEvolChart.destroy();
  window.__ruptEvolChart = new Chart(document.getElementById('ruptEvolCanvas'), {
    type:'line',
    data:{ labels:ruptLabels, datasets:[{
      data:evolRuptures, borderColor:'#c62828', backgroundColor:'rgba(198,40,40,0.12)',
      fill:true, tension:0.25, pointRadius:3, pointBackgroundColor:'#c62828'
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ y:{ beginAtZero:true, grid:{color:'#ece7f8'} }, x:{ grid:{display:false} } }
    }
  });
}

function exportCurrentTableCSV(){
  const q = document.getElementById('detailSearch').value||'';
  const st = document.getElementById('filterStatut').value;
  const ty = document.getElementById('filterType').value;
  let rows = RAW_ROWS;
  if(currentMarqueFilter) rows = rows.filter(r=>r.MARQUE===currentMarqueFilter);
  if(currentGammeFilter) rows = rows.filter(r=>deriveGamme(r.PRODUIT)===currentGammeFilter);
  if(currentTypeGroupFilter==='FACTICE') rows = rows.filter(r=>r.TYPE_PRODUIT==='FACTICE');
  else if(currentTypeGroupFilter==='AUTRES') rows = rows.filter(r=>r.TYPE_PRODUIT!=='FACTICE');
  if(st) rows = rows.filter(r=>r.STATUT===st);
  if(ty) rows = rows.filter(r=>r.TYPE_PRODUIT===ty);
  if(q) rows = rows.filter(r=> rowMatchesQuery(r, q));
  const ws = XLSX.utils.json_to_sheet(rows.map(r=>{ const o={}; UI_COLS.forEach(c=>o[c]=r[c]); return o; }));
  const csv = XLSX.utils.sheet_to_csv(ws, {FS:';'});
  downloadBlob(csv, 'export_detail.csv', 'text/csv;charset=utf-8;');
}

// ---------- ETAT DES STOCKS TAB ----------
function getISOWeek(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}
function weekLabel(d){ return 'W'+String(getISOWeek(d||new Date())).padStart(2,'0'); }

function buildEtatPivotFor(rows){
  const wanted = ['FACTICE','LDU','RDU','RDU LPM'];
  const stockKube = rows.filter(r=>r.STATUT==='STOCK KUBE' && wanted.includes(r.TYPE_PRODUIT));
  const byProduct = {};
  stockKube.forEach(r=>{
    const label = r.PRODUIT || `PRODUIT SANS NOM (ID ${r.ID}${r.N_SERIE?', N_SERIE '+r.N_SERIE:''})`;
    byProduct[label] = byProduct[label] || {};
    byProduct[label][r.TYPE_PRODUIT] = (byProduct[label][r.TYPE_PRODUIT]||0)+1;
  });
  const products = Object.keys(byProduct).sort((a,b)=>a.localeCompare(b));
  const lines = [];
  let total = 0;
  let num = 0;
  products.forEach(p=>{
    const types = byProduct[p];
    const subTotal = Object.values(types).reduce((a,b)=>a+b,0);
    total += subTotal;
    num++;
    lines.push({label:p, value:subTotal, bold:true, num});
    Object.keys(types).sort().forEach(t=>{
      lines.push({label:t, value:types[t], bold:false, num:null});
    });
  });
  return {lines, total};
}
function buildEtatPivot(){ return buildEtatPivotFor(RAW_ROWS); }

function renderEtat(){
  const el = document.getElementById('tab-etat');
  const {lines, total} = buildEtatPivot();
  window.__etatLines = lines;
  window.__etatTotal = total;
  el.innerHTML = `
  <div class="panel">
    <h3>ETAT DES STOCKS FIN ${weekLabel()} — Statut STOCK KUBE (RDU, RDU LPM, FACTICE, LDU)</h3>
    <div class="toolbar">
      <input id="etatSearch" placeholder="Rechercher un produit..." style="width:280px" oninput="renderEtatTable(this.value)">
      <span class="count-pill" id="etatCountPill"></span>
    </div>
    <div class="table-wrap" style="max-height:640px">
      <table>
        <thead><tr><th>Étiquettes de lignes</th><th>Nombre de STATUT</th></tr></thead>
        <tbody id="etatTbody"></tbody>
      </table>
    </div>
  </div>`;
  renderEtatTable('');
}
function renderEtatTable(q){
  const lines = window.__etatLines;
  const total = window.__etatTotal;
  const norm = s => String(s||'').toUpperCase().replace(/\s+/g,'');
  const qn = norm(q);
  let filtered = lines;
  let shownTotal = total;
  if(qn){
    filtered = [];
    let keep = false;
    let groupTotal = 0;
    lines.forEach(l=>{
      if(l.bold){
        keep = norm(l.label).includes(qn);
        if(keep) filtered.push(l);
      } else if(keep){
        filtered.push(l);
      }
    });
    shownTotal = filtered.filter(l=>l.bold).reduce((a,l)=>a+l.value,0);
  }
  const groupCount = filtered.filter(l=>l.bold).length;
  document.getElementById('etatCountPill').innerHTML = `<b>${groupCount}</b><span>produit(s)</span>`;
  document.getElementById('etatTbody').innerHTML =
    filtered.map(l=>`<tr style="${l.bold?'background:rgba(184,216,240,0.18)':''}"><td style="${l.bold?'font-weight:700':'padding-left:24px;color:var(--muted)'}">${l.label}</td><td style="${l.bold?'font-weight:700':''}">${l.value}</td></tr>`).join('')
    + `<tr><td style="font-weight:800">Total ${qn?'(filtré)':'général'}</td><td style="font-weight:800">${shownTotal}</td></tr>`;
}

// ---------- EXPORT GLOBAL (ETAT DES STOCKS = ex "AD") ----------
const STYLE_HEADER = { fill:{patternType:'solid', fgColor:{rgb:'DDEBF7'}}, font:{bold:true, color:{rgb:'000000'}}, alignment:{vertical:'center'} };
const STYLE_SUBHEADER = { fill:{patternType:'solid', fgColor:{rgb:'DDEBF7'}}, font:{bold:true, color:{rgb:'000000'}} };
const STYLE_PRODUCT = { fill:{patternType:'solid', fgColor:{rgb:'EAF2FB'}}, font:{bold:true, color:{rgb:'000000'}} };
const STYLE_SUBTYPE = { font:{color:{rgb:'000000'}}, alignment:{indent:1} };
const STYLE_TOTAL = { fill:{patternType:'solid', fgColor:{rgb:'DDEBF7'}}, font:{bold:true, color:{rgb:'000000'}} };

function setCellStyle(ws, r, c, style){
  const addr = XLSX.utils.encode_cell({r,c});
  if(!ws[addr]) ws[addr] = {t:'s', v:''};
  ws[addr].s = style;
}

function exportEtatDesStocksFor(rows, outFilename, dateForWeek){
  const wb = XLSX.utils.book_new();

  const bddRows = rows.map(r=>{ const o={}; COLS.forEach(c=>o[c]=r[c]); return o; });
  const wsBDD = XLSX.utils.json_to_sheet(bddRows);
  COLS.forEach((c,i)=> setCellStyle(wsBDD, 0, i, STYLE_HEADER));
  wsBDD['!cols'] = COLS.map(()=>({wch:16}));
  XLSX.utils.book_append_sheet(wb, wsBDD, 'BDD');

  const {lines, total} = buildEtatPivotFor(rows);
  const wl = weekLabel(dateForWeek);
  const aoa = [
    ['STATUT','STOCK KUBE'],
    [null,null],
    ['Étiquettes de lignes','Nombre de STATUT']
  ];
  lines.forEach(l=> aoa.push([l.label, l.value]));
  aoa.push(['Total général', total]);
  const wsEtat = XLSX.utils.aoa_to_sheet(aoa);
  wsEtat['!cols'] = [{wch:32},{wch:16}];

  setCellStyle(wsEtat, 0, 0, STYLE_HEADER);
  setCellStyle(wsEtat, 0, 1, STYLE_HEADER);
  setCellStyle(wsEtat, 2, 0, STYLE_SUBHEADER);
  setCellStyle(wsEtat, 2, 1, STYLE_SUBHEADER);
  lines.forEach((l,i)=>{
    const row = 3+i;
    const style = l.bold ? STYLE_PRODUCT : STYLE_SUBTYPE;
    setCellStyle(wsEtat, row, 0, style);
    setCellStyle(wsEtat, row, 1, style);
  });
  const totalRow = 3+lines.length;
  setCellStyle(wsEtat, totalRow, 0, STYLE_TOTAL);
  setCellStyle(wsEtat, totalRow, 1, STYLE_TOTAL);

  const sheetName = ('ETAT DES STOCKS FIN '+wl).slice(0,31);
  XLSX.utils.book_append_sheet(wb, wsEtat, sheetName);

  XLSX.writeFile(wb, outFilename || `ETAT_DES_STOCKS_FIN_${wl}.xlsx`);
}
function exportEtatDesStocks(){
  exportEtatDesStocksFor(RAW_ROWS, `ETAT_DES_STOCKS_FIN_${weekLabel()}.xlsx`, new Date());
}

function downloadBlob(content, filename, mime){
  const blob = new Blob([content], {type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

    <h3 style="color:#e8a2bd;border-left-color:#e8a2bd">Paramètres des ruptures</h3>
    <p class="small">Décochez un produit pour qu'il ne soit plus compté comme rupture (stock 0), maintenant et lors des prochains imports. Le réglage est mémorisé sur cet ordinateur, même si le produit disparaît temporairement de l'import.</p>
    <div class="toolbar">
      <input id="ruptureParamsSearch" placeholder="Rechercher un produit..." style="width:280px" oninput="renderRuptureParamsList(this.value)">

  </div>`;

function renderRuptureParamsList(q){
  const norm = s => String(s||'').toUpperCase().replace(/\s+/g,'');
  const qn = norm(q);
  const list = window.__ruptureListRaw.filter(x=> !qn || norm(x.produit).includes(qn));
  document.getElementById('ruptureParamsCountPill').innerHTML = `<b>${list.length}</b><span>produit(s)</span>`;
  document.getElementById('ruptureParamsList').innerHTML =
    list.length===0 ? '<div class="small">Aucun produit à stock 0 correspondant.</div>' :
    list.map(x=>{
      const safe = x.produit.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      return `<label style="display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;cursor:pointer">
          <input type="checkbox" ${window.__rupturePending[x.produit]!==false?'checked':''} onchange="window.__rupturePending['${safe}']=this.checked" style="width:16px;height:16px">
          <span>${x.produit}</span>
        </label>`;
    }).join('');
}
function saveRuptureParams(){
  const exclusions = getRuptureExclusions();
  Object.keys(window.__rupturePending).forEach(p=>{
    if(window.__rupturePending[p]) delete exclusions[p];
    else exclusions[p] = true;
  });
  setRuptureExclusions(exclusions);
  renderDashboard();
  const pill = document.getElementById('ruptureParamsSavedPill');
  pill.classList.remove('hide');
  setTimeout(()=> pill.classList.add('hide'), 2500);
}

  el.innerHTML = `

    <p class="small">Décochez un type d'anomalie pour qu'il ne soit plus détecté ni compté, sur cet import comme sur les prochains. Le réglage est mémorisé sur cet ordinateur.</p>

  </div>`;
  renderParamsList('');
}
function renderParamsList(q){
  const norm = s => String(s||'').toUpperCase().replace(/\s+/g,'');
  const qn = norm(q);
  const list = RULE_DEFS.filter(rd=> !qn || norm(rd.label).includes(qn));
  document.getElementById('paramsCountPill').innerHTML = `<b>${list.length}</b><span>type(s)</span>`;

          <input type="checkbox" data-rule="${rd.key}" ${window.__paramsPending[rd.key]!==false?'checked':''} onchange="window.__paramsPending['${rd.key}']=this.checked" style="width:16px;height:16px">
          <span>${rd.label}</span>
        </label>`).join('');
}
function saveAnomalyParams(){
  setEnabledRules(window.__paramsPending);
  renderDashboard();
  renderAnomalies();

  pill.classList.remove('hide');
  setTimeout(()=> pill.classList.add('hide'), 2500);
}

function showTab(name){

    document.getElementById('tab-'+t).classList.toggle('hide', t!==name);
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  document.getElementById('topKpiGrid').classList.toggle('hide', name!=='dashboard');

  if(name==='ruptureParams') renderRuptureParams();
  if(name==='historique') renderHistorique();
}
