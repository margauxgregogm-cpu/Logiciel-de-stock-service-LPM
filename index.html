<script>
// ---------- AUTO-MISE À JOUR ----------
// Service worker (uniquement pour piloter le rechargement, aucune mise en cache)
// + vérification périodique d'une nouvelle version déployée (via l'en-tête ETag
// de la page), pour recharger automatiquement sans que l'utilisateur ait à faire F5.
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
  let swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(swRefreshing) return;
    swRefreshing = true;
    location.reload();
  });
}

// ---------- INSTALLATION PWA ----------
// Le bouton "Télécharger le logiciel" est toujours visible (le navigateur ne
// signale pas toujours de façon fiable l'installabilité). S'il capte
// l'évènement natif, il déclenche l'installation ; sinon il explique comment
// installer manuellement. Masqué uniquement si l'app est déjà installée.
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
});
window.addEventListener('appinstalled', ()=>{
  deferredInstallPrompt = null;
  document.getElementById('installBtn').classList.add('hide');
});
async function installApp(){
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    return;
  }
  const ua = navigator.userAgent;
  let msg;
  if(/iPhone|iPad|iPod/.test(ua)){
    msg = "Sur iPhone/iPad : appuyez sur le bouton Partager de Safari, puis \"Sur l'écran d'accueil\".";
  } else if(/Android/.test(ua)){
    msg = "Sur Android : ouvrez le menu ⋮ du navigateur, puis \"Installer l'application\" ou \"Ajouter à l'écran d'accueil\".";
  } else {
    msg = "Ouvrez le menu de votre navigateur (souvent ⋮ ou une icône dans la barre d'adresse) et choisissez \"Installer\" ou \"Ajouter à l'écran d'accueil\". Sur Chrome/Edge, une icône d'installation apparaît généralement directement dans la barre d'adresse.";
  }
  alert(msg);
}
if(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone){
  document.getElementById('installBtn').classList.add('hide');
}

let PAGE_VERSION_TAG = null;
async function checkForNewVersion(){
  try{
    // Le paramètre de requête aléatoire est nécessaire pour contourner le
    // cache CDN de Vercel : {cache:'no-store'} n'empêche que la mise en
    // cache locale du navigateur, pas celle du CDN, qui peut renvoyer une
    // réponse HEAD mise en cache (donc une ancienne version) sans passer
    // par ce contournement, empêchant l'auto-rechargement de se déclencher.
    const res = await fetch(location.pathname + '?_v=' + Date.now(), {method:'HEAD', cache:'no-store'});
    const tag = res.headers.get('etag') || res.headers.get('last-modified');
    if(!tag) return;
    if(PAGE_VERSION_TAG === null){ PAGE_VERSION_TAG = tag; return; }
    if(tag !== PAGE_VERSION_TAG) location.reload();
  }catch(e){ /* pas de connexion, on réessaiera au prochain tick */ }
}
checkForNewVersion();
setInterval(checkForNewVersion, 45000);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) checkForNewVersion(); });

// ---------- SUPABASE ----------
// Renseigner ces deux valeurs depuis Project Settings > API sur supabase.com,
// puis créer les tables via le SQL fourni (voir supabase_schema.sql).
const SUPABASE_URL = 'https://rbditgrvpiosrygxlvez.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiZGl0Z3J2cGlvc3J5Z3hsdmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MzQ3ODcsImV4cCI6MjA5OTUxMDc4N30.66kyptlKnl86gcUIn_Si5PgAFmujBUu4XPy8Q1585Gg';
const sb = (window.supabase && /^https?:\/\//.test(SUPABASE_URL))
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;
if(!sb) console.warn('Supabase non configuré — l\'application fonctionne en local uniquement (localStorage).');

const COLS = ['MARQUE','PRODUIT','TYPE_PRODUIT','IMEI','N_SERIE','STATUT','MAGASIN','REGATE','FORMAT_MOBILIER','TYPE_MOBILIER','COMMENTAIRE'];
const UI_COLS = ['ID', ...COLS];
let RAW_ROWS = [];      // lignes brutes normalisées (objets)
let ANOMALIES = [];     // {idx,row,messages:[]}
let fileInfo = {name:'',rows:0,ts:null};
let currentMarqueFilter = null;
let currentGammeFilter = null;
let gammeSelectedMarque = null;

function norm(v){
  if(v===null||v===undefined) return '';
  let s = String(v).trim();
  if(s==='' ) return '';
  return s;
}
function up(v){ return norm(v).toUpperCase(); }

function handleFile(file){
  const reader = new FileReader();
  reader.onload = function(e){
    let data = e.target.result;
    let wb;
    if(file.name.toLowerCase().endsWith('.csv')){
      wb = XLSX.read(data, {type:'binary', raw:true});
    } else {
      wb = XLSX.read(data, {type:'binary'});
    }
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, {defval:''});
    ingest(json, file.name);
  };
  reader.readAsBinaryString(file);
}

function extractFileDate(filename, importTs){
  // 1) Format JJMMAAAA (8 chiffres, ex: 13072026)
  const matches8 = filename.match(/\d{8}/g) || [];
  for(const m of matches8){
    const day = parseInt(m.slice(0,2),10);
    const month = parseInt(m.slice(2,4),10);
    const year = parseInt(m.slice(4,8),10);
    if(day>=1 && day<=31 && month>=1 && month<=12 && year>=2000 && year<=2100){
      const d = new Date(year, month-1, day);
      if(d.getMonth()===month-1) return {date:d, source:'filename'};
    }
  }
  // 2) Format JJ-MM sans année (ex: 15-07, "ETAT DES STOCKS 15-07.csv") :
  // on suppose l'année en cours (celle de importTs).
  const matchesDM = [...filename.matchAll(/\b(\d{2})-(\d{2})\b/g)];
  for(const m of matchesDM){
    const day = parseInt(m[1],10);
    const month = parseInt(m[2],10);
    if(day>=1 && day<=31 && month>=1 && month<=12){
      const year = importTs.getFullYear();
      const d = new Date(year, month-1, day);
      if(d.getMonth()===month-1) return {date:d, source:'filename'};
    }
  }
  // Repli : date d'import du fichier
  return {date:new Date(importTs.getFullYear(), importTs.getMonth(), importTs.getDate()), source:'import'};
}
function isSameDay(a,b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function renderImportStatusBanner(){
  const el = document.getElementById('importStatusBanner');
  const today = new Date();
  const {date, source} = extractFileDate(fileInfo.name, fileInfo.ts);
  const dateStr = date.toLocaleDateString('fr-FR');
  const upToDate = isSameDay(date, today);
  if(upToDate){
    el.innerHTML = `<div class="import-banner ok">Import à jour — ${dateStr}</div>`;
  } else {
    const detail = source==='filename'
      ? `le fichier date du ${dateStr}`
      : `le fichier a été importé le ${dateStr}`;
    el.innerHTML = `<div class="import-banner stale" onclick="document.getElementById('fileInput2').click()">Importez votre export SODA du jour — ${detail}</div>`;
  }
}

function ingest(json, filename){
  RAW_ROWS = json.map((r,i)=>{
    const o = {
      ID: norm(r.ID),
      MARQUE: up(r.MARQUE),
      PRODUIT: up(r.PRODUIT),
      TYPE_PRODUIT: up(r.TYPE_PRODUIT),
      IMEI: norm(r.IMEI),
      N_SERIE: norm(r.N_SERIE),
      STATUT: up(r.STATUT),
      MAGASIN: norm(r.MAGASIN),
      REGATE: norm(r.REGATE),
      FORMAT_MOBILIER: norm(r.FORMAT_MOBILIER),
      TYPE_MOBILIER: norm(r.TYPE_MOBILIER),
      COMMENTAIRE: norm(r.COMMENTAIRE)
    };
    o._idx = i;
    return o;
  });
  fileInfo = {name:filename, rows:RAW_ROWS.length, ts:new Date()};
  computeAnomalies();
  document.getElementById('fileMeta').textContent = `${fileInfo.name} — ${fileInfo.rows} lignes — importé ${fileInfo.ts.toLocaleString('fr-FR')}`;
  renderImportStatusBanner();
  document.getElementById('topKpiGrid').classList.remove('hide');
  addHistoryEntry();
  showTab('dashboard');
  renderDashboard();

const HISTORY_KEY = 'soda_import_history';
const HISTORY_MAX = 40;
let currentHistoryId = null;
let HISTORY_CACHE = [];

function getImportHistory(){
  return HISTORY_CACHE;
}
function getLocalHistory(){
  try{ const raw = localStorage.getItem(HISTORY_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return [];
}
function saveLocalHistory(list){
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }
  catch(e){ console.warn('Historique : espace de stockage local insuffisant, entrée(s) la/les plus ancienne(s) non conservée(s).'); }
}
async function loadHistoryFromSupabase(){
  if(!sb){ HISTORY_CACHE = getLocalHistory(); return; }
  try{
    const {data, error} = await sb
      .from('import_history')
      .select('*')
      .order('imported_at', {ascending:false})
      .limit(HISTORY_MAX);
    if(error) throw error;
    HISTORY_CACHE = data.map(row=>({
      id: row.id, date: row.imported_at, filename: row.filename,
      rows: row.rows_count, anomalies: row.anomalies_count, data: row.data
    }));
    saveLocalHistory(HISTORY_CACHE);
  }catch(e){
    console.warn('Supabase indisponible, historique local utilisé.', e);
    HISTORY_CACHE = getLocalHistory();
  }
}

// Synchronisation multi-poste : quand un autre poste importe ou supprime un
// fichier, on veut que ça se reflète ici sans action de l'utilisateur. La
// colonne "data" peut être volumineuse (gros imports) et dépasser la limite
// de taille de Supabase Realtime, donc le message reçu n'est qu'un signal :
// on va toujours rechercher les données fraîches via une requête normale.
// Empêche la synchro temps réel d'écraser le cache local pendant qu'un
// import ou une suppression est en cours d'écriture sur ce même poste :
// sinon un évènement Realtime/sondage peut arriver entre la mise à jour
// locale (optimiste) et la confirmation Supabase, voir un état transitoire
// incohérent, et provoquer un "flash" retour à l'ancien import.
let historyWriteInFlight = false;
async function refreshHistoryFromRemote(){
  if(historyWriteInFlight) return;
  const previousLatestId = HISTORY_CACHE[0] ? HISTORY_CACHE[0].id : null;
  const previousIds = new Set(HISTORY_CACHE.map(e=>e.id));
  await loadHistoryFromSupabase();
  const stillActiveExists = HISTORY_CACHE.some(e=>e.id===currentHistoryId);
  let fullyRerendered = false;
  if(currentHistoryId && !stillActiveExists){
    // l'import affiché a été supprimé ailleurs
    currentHistoryId = null;
    if(HISTORY_CACHE.length>0){ openHistoryEntry(HISTORY_CACHE[0].id); }
    else { RAW_ROWS = []; ANOMALIES = []; showEmptyState(); }
    fullyRerendered = true;
  } else if(HISTORY_CACHE.length>0 && HISTORY_CACHE[0].id!==previousLatestId && !previousIds.has(HISTORY_CACHE[0].id)){
    // un nouvel import est arrivé ailleurs : on l'affiche
    openHistoryEntry(HISTORY_CACHE[0].id);
    fullyRerendered = true;
  }
  // Les graphiques d'évolution agrègent tout l'historique : même quand
  // l'import affiché ne change pas (ex: suppression d'un ancien import
  // ailleurs), ils doivent être rafraîchis pour rester exacts partout.
  if(!fullyRerendered) renderEvolutionCharts();
  const histTab = document.getElementById('tab-historique');
  if(histTab && !histTab.classList.contains('hide')) renderHistorique();
}

function subscribeToHistoryChanges(){
  if(!sb) return;
  sb.channel('import_history_changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'import_history'}, ()=>{ refreshHistoryFromRemote(); })
    .subscribe();
  // Filet de sécurité si Realtime rate un évènement (gros payload, etc.)
  setInterval(async ()=>{
    try{
      const {data, error} = await sb.from('import_history').select('id').order('imported_at',{ascending:false}).limit(1);
      if(error) throw error;
      const latestId = data && data[0] ? data[0].id : null;
      const knownId = HISTORY_CACHE[0] ? HISTORY_CACHE[0].id : null;
      if(latestId!==knownId || (HISTORY_CACHE.length===0 && latestId)) refreshHistoryFromRemote();
    }catch(e){ /* on réessaiera au prochain tick */ }
  }, 20000);
}

  const list = getImportHistory();

  // Télécharge l'import brut tel qu'il a été importé ce jour-là (et non
  // l'état des stocks calculé, qui a son propre bouton d'export dédié).
  const rows = (entry.data||[]).map(r=>{ const o={}; UI_COLS.forEach(c=>o[c]=r[c]); return o; });

const RULE_DEFS = [
  {key:'r1', label:'Statut MAGASIN / VOL EN MAGASIN : champs magasin incomplets'},
  {key:'r2', label:'FACTICE avec IMEI renseigné'},
  {key:'r3', label:'STOCK KUBE : champs magasin non vides'},
  {key:'r5', label:'HS sans commentaire'},
  {key:'r8', label:'Produit sans nom'},
  {key:'r9', label:'RDU / RDU LPM incomplet (N_SERIE / IMEI)'},
  {key:'r10', label:'LDU sans N_SERIE'},
  {key:'r67', label:'FACTICE : incohérence de N_SERIE entre produits identiques'}
];
let ANOMALY_RULES_CACHE = null;
function getEnabledRules(){
  if(ANOMALY_RULES_CACHE) return ANOMALY_RULES_CACHE;
  try{
    const raw = localStorage.getItem('soda_anomaly_rules');
    if(raw){ ANOMALY_RULES_CACHE = JSON.parse(raw); return ANOMALY_RULES_CACHE; }
  }catch(e){}
  const def = {};
  RULE_DEFS.forEach(r=> def[r.key]=true);
  ANOMALY_RULES_CACHE = def;
  return def;
}
function setEnabledRules(obj){
  ANOMALY_RULES_CACHE = obj;
  try{ localStorage.setItem('soda_anomaly_rules', JSON.stringify(obj)); }catch(e){}
  syncSettingToSupabase('anomaly_rules', obj);
}

function computeAnomaliesForRows(rows){
  const byIdx = rows.map(r=>({row:r, messages:[]}));

  // Table N_SERIE -> nom produit, construite à partir des FACTICE déjà nommés
  const nserieToName = {};
  const nserieToNameFreq = {};
  rows.forEach(r=>{
    if(r.TYPE_PRODUIT==='FACTICE' && r.N_SERIE && r.PRODUIT){
      nserieToNameFreq[r.N_SERIE] = nserieToNameFreq[r.N_SERIE] || {};
      nserieToNameFreq[r.N_SERIE][r.PRODUIT] = (nserieToNameFreq[r.N_SERIE][r.PRODUIT]||0)+1;
    }
  });
  Object.keys(nserieToNameFreq).forEach(ns=>{
    const names = nserieToNameFreq[ns];
    let best = null;
    Object.keys(names).forEach(n=>{ if(!best || names[n]>names[best]) best = n; });
    nserieToName[ns] = best;
  });

  rows.forEach((r,i)=>{
    const msgs = byIdx[i].messages;

    // Regle 1: MAGASIN / VOL EN MAGASIN -> champs obligatoires
    if(r.STATUT==='MAGASIN' || r.STATUT==='VOL EN MAGASIN'){
      const miss = [];
      if(!r.MAGASIN) miss.push('MAGASIN');
      if(!r.REGATE) miss.push('REGATE');
      if(!r.FORMAT_MOBILIER) miss.push('FORMAT_MOBILIER');
      if(!r.TYPE_MOBILIER) miss.push('TYPE_MOBILIER');
      if(miss.length) msgs.push({rule:'r1', text:`Statut ${r.STATUT} : champ(s) manquant(s) — ${miss.join(', ')}`});
    }

    // Regle 2: FACTICE ne doit pas avoir d'IMEI
    if(r.TYPE_PRODUIT==='FACTICE' && r.IMEI){
      msgs.push({rule:'r2', text:'FACTICE avec IMEI renseigné'});
    }

    // Regle 3: STOCK KUBE -> champs magasin doivent être vides
    if(r.STATUT==='STOCK KUBE'){
      const fill = [];
      if(r.MAGASIN) fill.push('MAGASIN');
      if(r.REGATE) fill.push('REGATE');
      if(r.FORMAT_MOBILIER) fill.push('FORMAT_MOBILIER');
      if(r.TYPE_MOBILIER) fill.push('TYPE_MOBILIER');
      if(fill.length) msgs.push({rule:'r3', text:`Statut STOCK KUBE : champ(s) qui devraient être vides — ${fill.join(', ')}`});
    }

    // Regle 5: HS doit avoir un commentaire
    if(r.STATUT==='HS' && !r.COMMENTAIRE){
      msgs.push({rule:'r5', text:'Produit HS sans commentaire'});
    }

    // Regle 8: tout produit doit avoir un nom (y compris les FACTICE)
    if(!r.PRODUIT){
      if(r.TYPE_PRODUIT==='FACTICE' && r.N_SERIE && nserieToName[r.N_SERIE]){
        msgs.push({rule:'r8', text:`Produit FACTICE sans nom — suggestion : "${nserieToName[r.N_SERIE]}" (d'après le N_SERIE ${r.N_SERIE} sur d'autres factices)`});
      } else {
        msgs.push({rule:'r8', text:'Produit sans nom (PRODUIT vide)'});
      }
    }

    // Regle 9: RDU / RDU LPM -> N_SERIE + IMEI obligatoires (sauf BOX SFR, sans IMEI par nature)
    if(r.TYPE_PRODUIT==='RDU' || r.TYPE_PRODUIT==='RDU LPM'){
      const isBoxSfr = r.PRODUIT.toUpperCase().includes('BOX SFR');
      const miss=[];
      if(!r.N_SERIE) miss.push('N_SERIE');
      if(!r.IMEI && !isBoxSfr) miss.push('IMEI');
      if(miss.length) msgs.push({rule:'r9', text:`${r.TYPE_PRODUIT} incomplet — ${miss.join(', ')} manquant(s)`});
    }

    // Regle 10: LDU -> N_SERIE obligatoire
    if(r.TYPE_PRODUIT==='LDU' && !r.N_SERIE){
      msgs.push({rule:'r10', text:'LDU sans N_SERIE'});
    }
  });

  // Regle 6/7 : cohérence N_SERIE des FACTICE par nom de produit
  const groups = {};
  rows.forEach((r,i)=>{
    if(r.TYPE_PRODUIT==='FACTICE' && r.PRODUIT){
      (groups[r.PRODUIT] = groups[r.PRODUIT] || []).push(i);
    }
  });
  Object.keys(groups).forEach(pname=>{
    const idxs = groups[pname];
    const freq = {};
    idxs.forEach(i=>{
      const ns = rows[i].N_SERIE;
      if(ns) freq[ns] = (freq[ns]||0)+1;
    });
    const keys = Object.keys(freq);
    if(keys.length===0) return; // aucun N_SERIE dans le groupe, rien à vérifier
    let majority = keys[0];
    keys.forEach(k=>{ if(freq[k]>freq[majority]) majority = k; });
    idxs.forEach(i=>{
      const ns = rows[i].N_SERIE;
      if(!ns){
        byIdx[i].messages.push({rule:'r67', text:`FACTICE "${pname}" : N_SERIE manquant (attendu ${majority} d'après les autres lignes du même produit)`});
      } else if(ns!==majority){
        byIdx[i].messages.push({rule:'r67', text:`FACTICE "${pname}" : N_SERIE incohérent (${ns}) — suggestion ${majority}`});
      }
    });
  });
  return byIdx;
}
function computeAnomalies(){
  ANOMALIES = computeAnomaliesForRows(RAW_ROWS);
}
function anomalyCountForRows(rows){
  const enabled = getEnabledRules();
  return computeAnomaliesForRows(rows).filter(a=> a.messages.some(m=> enabled[m.rule]!==false)).length;
}

function anomalyRows(){
  const enabled = getEnabledRules();
  return ANOMALIES
    .map(a=>({row:a.row, messages:a.messages.filter(m=> enabled[m.rule]!==false)}))
    .filter(a=>a.messages.length>0);
}

function ruptureCountForRows(rows){
  const nserieToName = buildNserieToNameMap(rows);
  const resolveProduit = r => r.PRODUIT || (r.N_SERIE && nserieToName[r.N_SERIE]) || '';
  const allProducts = new Set(rows.map(resolveProduit).filter(Boolean));
  const stockKube = rows.filter(r=>r.STATUT==='STOCK KUBE');
  const qty = {};
  stockKube.forEach(r=>{ const p=resolveProduit(r); if(p) qty[p] = (qty[p]||0)+1; });
  const exclusions = getRuptureExclusions();
  let count = 0;
  allProducts.forEach(p=>{ if((qty[p]||0)===0 && !exclusions[p]) count++; });
  return count;
}

// Retrouve, pour un N_SERIE donné, le nom de produit le plus fréquent parmi
// les lignes qui ont un PRODUIT renseigné — utile pour rattacher une ligne
// sans nom (PRODUIT vide) au bon produit plutôt que de créer une entrée
// "PRODUIT SANS NOM" à part.
function buildNserieToNameMap(rows){
  const freq = {};
  rows.forEach(r=>{
    if(r.N_SERIE && r.PRODUIT){
      freq[r.N_SERIE] = freq[r.N_SERIE] || {};
      freq[r.N_SERIE][r.PRODUIT] = (freq[r.N_SERIE][r.PRODUIT]||0)+1;
    }
  });
  const map = {};
  Object.keys(freq).forEach(ns=>{
    const names = freq[ns];
    let best = null;
    Object.keys(names).forEach(n=>{ if(!best || names[n]>names[best]) best = n; });
    map[ns] = best;
  });
  return map;
}

function productBands(){
  // univers = tous les PRODUIT distincts non vides (ou retrouvés via N_SERIE) ;
  // quantite = nb de lignes STATUT=STOCK KUBE pour ce produit
  const nserieToName = buildNserieToNameMap(RAW_ROWS);
  const resolveProduit = r => r.PRODUIT || (r.N_SERIE && nserieToName[r.N_SERIE]) || '';
  const allProducts = new Set(RAW_ROWS.map(resolveProduit).filter(Boolean));
  const stockKube = RAW_ROWS.filter(r=>r.STATUT==='STOCK KUBE');
  const qty = {};
  const typesByProduct = {};
  stockKube.forEach(r=>{
    const p = resolveProduit(r);
    if(!p) return;
    qty[p] = (qty[p]||0)+1;
    typesByProduct[p] = typesByProduct[p] || {};
    if(r.TYPE_PRODUIT) typesByProduct[p][r.TYPE_PRODUIT] = (typesByProduct[p][r.TYPE_PRODUIT]||0)+1;
  });
  const list0Raw = [], listUnder10 = [], listUnder30 = [];
  allProducts.forEach(p=>{
    const q = qty[p]||0;
    const types = typesByProduct[p]||{};
    if(q===0) list0Raw.push({produit:p, qty:q, types});
    else if(q>=1 && q<10) listUnder10.push({produit:p, qty:q, types});
    else if(q>=10 && q<30) listUnder30.push({produit:p, qty:q, types});
  });
  list0Raw.sort((a,b)=>a.produit.localeCompare(b.produit));
  listUnder10.sort((a,b)=>a.qty-b.qty);
  listUnder30.sort((a,b)=>a.qty-b.qty);
  const exclusions = getRuptureExclusions();
  const list0 = list0Raw.filter(x=> !exclusions[x.produit]);
  return {list0, list0Raw, listUnder10, listUnder30};
}

function marqueCounts(){
  const m = {};
  RAW_ROWS.forEach(r=>{ const k=r.MARQUE||'(vide)'; m[k]=(m[k]||0)+1; });
  return m;
}

function gammeGroupCounts(rows, groupField){
  const factice = {}, autres = {};
  rows.filter(r=>r.STATUT==='STOCK KUBE' && r[groupField]).forEach(r=>{
    const k = r[groupField];
    if(r.TYPE_PRODUIT==='FACTICE') factice[k]=(factice[k]||0)+1;
    else autres[k]=(autres[k]||0)+1;
  });
  const keys = new Set([...Object.keys(factice), ...Object.keys(autres)]);
  const data = [...keys].map(k=>({
    key:k, factice:factice[k]||0, autres:autres[k]||0, total:(factice[k]||0)+(autres[k]||0)
  }));
  data.sort((a,b)=>a.key.localeCompare(b.key, 'fr', {sensitivity:'base'}));
  return data;
}

let anomEvolPeriod = 'tout';
let ruptEvolPeriod = 'tout';
function setEvolPeriod(which, period){
  if(which==='anom') anomEvolPeriod = period; else ruptEvolPeriod = period;
  renderEvolutionCharts();
}
function periodKey(d, period){
  if(period==='semaine'){
    const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = (tmp.getUTCDay()+6)%7;
    tmp.setUTCDate(tmp.getUTCDate()-dayNum+3);
    const firstThursday = new Date(Date.UTC(tmp.getUTCFullYear(),0,4));
    const weekNo = 1+Math.round(((tmp-firstThursday)/86400000 - 3 + (firstThursday.getUTCDay()+6)%7)/7);
    return `${tmp.getUTCFullYear()}-S${String(weekNo).padStart(2,'0')}`;
  }
  if(period==='mois') return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  if(period==='annee') return `${d.getFullYear()}`;
  return null;
}
// Date à utiliser pour les graphiques : celle du nom du fichier si on peut
// l'y trouver (format JJMMAAAA), sinon la date d'import en repli.
function entryDisplayDate(entry){
  return extractFileDate(entry.filename||'', new Date(entry.date)).date;
}
function bucketHistoryByPeriod(entriesAsc, period){
  if(period==='tout') return entriesAsc;
  const map = new Map();
  entriesAsc.forEach(e=>{ map.set(periodKey(entryDisplayDate(e), period), e); }); // garde la dernière entrée de chaque période
  return [...map.values()];
}
function evolLabelFor(entry, period){
  const d = entryDisplayDate(entry);
  const dd = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
  if(period==='tout') return dd;
  return periodKey(d, period).replace('-S',' S') + ` (${dd})`;
}
function renderEvolutionCharts(){
  if(!document.getElementById('anomEvolCanvas') || !document.getElementById('ruptEvolCanvas')) return;
  const histAsc = [...HISTORY_CACHE].sort((a,b)=> entryDisplayDate(a)-entryDisplayDate(b));

  const anomEntries = bucketHistoryByPeriod(histAsc, anomEvolPeriod);
  const anomLabels = anomEntries.map(e=>evolLabelFor(e, anomEvolPeriod));
  const evolAnomalies = anomEntries.map(e=> anomalyCountForRows(e.data||[]));

  const ruptEntries = bucketHistoryByPeriod(histAsc, ruptEvolPeriod);
  const ruptLabels = ruptEntries.map(e=>evolLabelFor(e, ruptEvolPeriod));
  const evolRuptures = ruptEntries.map(e=> ruptureCountForRows(e.data||[]));

  if(window.__anomEvolChart) window.__anomEvolChart.destroy();
  window.__anomEvolChart = new Chart(document.getElementById('anomEvolCanvas'), {
    type:'line',
    data:{ labels:anomLabels, datasets:[{
      data:evolAnomalies, borderColor:'#d98200', backgroundColor:'rgba(217,130,0,0.12)',
      fill:true, tension:0.25, pointRadius:3, pointBackgroundColor:'#d98200'
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ y:{ beginAtZero:true, grid:{color:'#ece7f8'} }, x:{ grid:{display:false} } }
    }
  });

  if(window.__ruptEvolChart) window.__ruptEvolChart.destroy();
  window.__ruptEvolChart = new Chart(document.getElementById('ruptEvolCanvas'), {
    type:'line',
    data:{ labels:ruptLabels, datasets:[{
      data:evolRuptures, borderColor:'#c62828', backgroundColor:'rgba(198,40,40,0.12)',
      fill:true, tension:0.25, pointRadius:3, pointBackgroundColor:'#c62828'
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ y:{ beginAtZero:true, grid:{color:'#ece7f8'} }, x:{ grid:{display:false} } }
    }
  });
}

function rowMatchesQuery(r, q){
  if(!q) return true;
  const norm = s => String(s||'').toUpperCase().replace(/\s+/g,'');
  const qn = norm(q);
  const hay = UI_COLS.map(c=>String(r[c]||'')).join(' ');
  return norm(hay).includes(qn);

function renderDetailTable(){

function getISOWeek(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}
function weekLabel(d){
  // L'état des stocks porte sur la semaine suivante (S+1), pas la semaine en cours.
  const base = d || new Date();
  const nextWeek = new Date(base.getTime() + 7*86400000);
  return 'W'+String(getISOWeek(nextWeek)).padStart(2,'0');
}

function buildEtatPivotFor(rows){
  const wanted = ['FACTICE','LDU','RDU','RDU LPM'];
  const stockKube = rows.filter(r=>r.STATUT==='STOCK KUBE' && wanted.includes(r.TYPE_PRODUIT));
  const nserieToName = buildNserieToNameMap(rows);
  const byProduct = {};
  stockKube.forEach(r=>{
    const label = r.PRODUIT || (r.N_SERIE && nserieToName[r.N_SERIE]) || `PRODUIT SANS NOM (ID ${r.ID}${r.N_SERIE?', N_SERIE '+r.N_SERIE:''})`;
    byProduct[label] = byProduct[label] || {};
    byProduct[label][r.TYPE_PRODUIT] = (byProduct[label][r.TYPE_PRODUIT]||0)+1;
  });
  const products = Object.keys(byProduct).sort((a,b)=>a.localeCompare(b));
  const lines = [];
  let total = 0;
  let num = 0;
  products.forEach(p=>{
    const types = byProduct[p];
    const subTotal = Object.values(types).reduce((a,b)=>a+b,0);
    total += subTotal;
    num++;
    lines.push({label:p, value:subTotal, bold:true, num});
    Object.keys(types).sort().forEach(t=>{
      lines.push({label:t, value:types[t], bold:false, num:null});
    });
  });
  return {lines, total};
}
function buildEtatPivot(){ return buildEtatPivotFor(RAW_ROWS); }

function renderEtat(){
  const el = document.getElementById('tab-etat');
  const {lines, total} = buildEtatPivot();
  window.__etatLines = lines;
  window.__etatTotal = total;
  el.innerHTML = `

        <thead><tr><th>Étiquettes de lignes</th><th>Nombre de STATUT</th></tr></thead>
        <tbody id="etatTbody"></tbody>
      </table>
    </div>
  </div>`;
  renderEtatTable('');
}
function renderEtatTable(q){
  const lines = window.__etatLines;
  const total = window.__etatTotal;
  const norm = s => String(s||'').toUpperCase().replace(/\s+/g,'');
  const qn = norm(q);
  let filtered = lines;
  let shownTotal = total;
  if(qn){
    filtered = [];
    let keep = false;
    let groupTotal = 0;
    lines.forEach(l=>{
      if(l.bold){
        keep = norm(l.label).includes(qn);
        if(keep) filtered.push(l);
      } else if(keep){
        filtered.push(l);
      }
    });
    shownTotal = filtered.filter(l=>l.bold).reduce((a,l)=>a+l.value,0);
  }
  const groupCount = filtered.filter(l=>l.bold).length;
  document.getElementById('etatCountPill').innerHTML = `<b>${groupCount}</b><span>produit(s)</span>`;
  const esc = s => String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
  let curProduit = '';
  document.getElementById('etatTbody').innerHTML =
    filtered.map(l=>{
      if(l.bold) curProduit = l.label;
      const safeProduit = esc(curProduit);
      const onclick = l.bold
        ? `filterDetailByEtat('${safeProduit}')`
        : `filterDetailByEtat('${safeProduit}','${esc(l.label)}')`;
      return `<tr style="${l.bold?'background:rgba(184,216,240,0.18);':''}cursor:pointer" onclick="${onclick}"><td style="${l.bold?'font-weight:700':'padding-left:24px;color:var(--muted)'}">${l.label}</td><td style="${l.bold?'font-weight:700':''}">${l.value}</td></tr>`;
    }).join('')
    + `<tr><td style="font-weight:800">Total ${qn?'(filtré)':'général'}</td><td style="font-weight:800">${shownTotal}</td></tr>`;
}

// ---------- EXPORT GLOBAL (ETAT DES STOCKS = ex "AD") ----------
const STYLE_HEADER = { fill:{patternType:'solid', fgColor:{rgb:'DDEBF7'}}, font:{bold:true, color:{rgb:'000000'}}, alignment:{vertical:'center'} };
const STYLE_SUBHEADER = { fill:{patternType:'solid', fgColor:{rgb:'DDEBF7'}}, font:{bold:true, color:{rgb:'000000'}} };
const STYLE_PRODUCT = { fill:{patternType:'solid', fgColor:{rgb:'EAF2FB'}}, font:{bold:true, color:{rgb:'000000'}} };
const STYLE_SUBTYPE = { font:{color:{rgb:'000000'}}, alignment:{indent:1} };
const STYLE_TOTAL = { fill:{patternType:'solid', fgColor:{rgb:'DDEBF7'}}, font:{bold:true, color:{rgb:'000000'}} };

function setCellStyle(ws, r, c, style){
  const addr = XLSX.utils.encode_cell({r,c});
  if(!ws[addr]) ws[addr] = {t:'s', v:''};
  ws[addr].s = style;
}

function exportEtatDesStocksFor(rows, outFilename, dateForWeek){
  const wb = XLSX.utils.book_new();

  const bddRows = rows.map(r=>{ const o={}; COLS.forEach(c=>o[c]=r[c]); return o; });
  const wsBDD = XLSX.utils.json_to_sheet(bddRows);
  COLS.forEach((c,i)=> setCellStyle(wsBDD, 0, i, STYLE_HEADER));
  wsBDD['!cols'] = COLS.map(()=>({wch:16}));
  XLSX.utils.book_append_sheet(wb, wsBDD, 'BDD');

  const {lines, total} = buildEtatPivotFor(rows);
  const wl = weekLabel(dateForWeek);
  const aoa = [
    ['STATUT','STOCK KUBE'],
    [null,null],
    ['Étiquettes de lignes','Nombre de STATUT']
  ];
  lines.forEach(l=> aoa.push([l.label, l.value]));
  aoa.push(['Total général', total]);
  const wsEtat = XLSX.utils.aoa_to_sheet(aoa);
  wsEtat['!cols'] = [{wch:32},{wch:16}];

  setCellStyle(wsEtat, 0, 0, STYLE_HEADER);
  setCellStyle(wsEtat, 0, 1, STYLE_HEADER);
  setCellStyle(wsEtat, 2, 0, STYLE_SUBHEADER);
  setCellStyle(wsEtat, 2, 1, STYLE_SUBHEADER);
  lines.forEach((l,i)=>{
    const row = 3+i;
    const style = l.bold ? STYLE_PRODUCT : STYLE_SUBTYPE;
    setCellStyle(wsEtat, row, 0, style);
    setCellStyle(wsEtat, row, 1, style);
  });
  const totalRow = 3+lines.length;
  setCellStyle(wsEtat, totalRow, 0, STYLE_TOTAL);
  setCellStyle(wsEtat, totalRow, 1, STYLE_TOTAL);

  const sheetName = ('ETAT DES STOCKS FIN '+wl).slice(0,31);
  XLSX.utils.book_append_sheet(wb, wsEtat, sheetName);

  XLSX.writeFile(wb, outFilename || `ETAT_DES_STOCKS_FIN_${wl}.xlsx`);
}
function exportEtatDesStocks(){
  exportEtatDesStocksFor(RAW_ROWS, `ETAT_DES_STOCKS_FIN_${weekLabel()}.xlsx`, new Date());
}

function downloadBlob(content, filename, mime){
  const blob = new Blob([content], {type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
